name: Force notification (dev)

on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          path: .

      - uses: actions/checkout@v5
        with:
          repository: meenow-de/meenow-push
          token: ${{ secrets.PUSH_SUBS_TOKEN }}
          path: push-subs

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install script dependencies
        run: npm install
        working-directory: scripts

      - name: Send forced tick
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
          VAPID_SUBJECT: mailto:2qhhabkrd@mozmail.com
          SUBS_DIR: push-subs/subscriptions/dev
          FORCE: 'true'
        run: node scripts/send-tick.mjs
